<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bot Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .discord-btn {
            background: #7289da !important;
            color: white !important;
            padding: 12px 24px !important;
            border: none !important;
            border-radius: 5px !important;
            font-size: 16px !important;
            cursor: pointer !important;
            text-decoration: none !important;
            display: inline-block !important;
            transition: background 0.3s !important;
        }
        .discord-btn:hover {
            background: #5a6db8 !important;
        }
        .invite-btn {
            background: #43b581 !important;
        }
        .invite-btn:hover {
            background: #3aa566 !important;
        }
        .button-container {
            display: flex;
            gap: 10px;
            flex-direction: column;
        }
    </style>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <h1>🤖 Bot Dashboard</h1>
            <p>Manage your Discord bot</p>

            <div class="button-container">
                <a href="/auth/discord" class="discord-btn">🔐 Login with Discord</a>
                <a href="#" id="invite-btn" class="discord-btn invite-btn" target="_blank">➕ Add Bot to Server</a>
            </div>

            <p id="error-message" class="error"></p>
        </div>
    </div>

    <script>
        // Load invite URL from API
        fetch('/api/invite-url')
            .then(res => res.json())
            .then(data => {
                if (data.invite_url) {
                    document.getElementById('invite-btn').href = data.invite_url;
                }
            })
            .catch(err => console.error('Failed to load invite URL:', err));
    </script>
</body>
</html>
